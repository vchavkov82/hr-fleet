global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "hr-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["hr-api:8080"]
        labels:
          service: "api"

  - job_name: "caddy"
    metrics_path: /metrics
    static_configs:
      - targets: ["caddy:2019"]
        labels:
          service: "caddy"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
