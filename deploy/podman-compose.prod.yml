# HR Product — Production Overrides
# Usage: podman-compose -f deploy/podman-compose.yml -f deploy/podman-compose.prod.yml up -d

services:

  # ── Go backend API ───────────────────────────────────────────────────────
  hr-api:
    restart: always
    ports: !reset []
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ODOO_URL: ${ODOO_URL:-http://hr-odoo:8069}
      REDIS_URL: ${REDIS_URL:-redis://hr-redis:6379}
      LOG_LEVEL: info
      GIN_MODE: release
      APP_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend apps ──────────────────────────────────────────────────────────
  hr:
    restart: always
    ports: !reset []
    image: ${HR_WWW_IMAGE:-hr-www:latest}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  hr-blog:
    restart: always
    ports: !reset []
    image: ${HR_BLOG_IMAGE:-hr-blog:latest}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3013/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  hr-docs:
    restart: always
    ports: !reset []
    image: ${HR_DOCS_IMAGE:-hr-docs:latest}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3011/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── PostgreSQL (API database) ────────────────────────────────────────────
  hr-db:
    restart: always
    ports: !reset []
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_platform}
      POSTGRES_USER: ${POSTGRES_USER:-hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # ── Odoo ERP ─────────────────────────────────────────────────────────────
  hr-odoo-db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  odoo:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Redis cache ──────────────────────────────────────────────────────────
  hr-redis:
    restart: always
    ports: !reset []
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
