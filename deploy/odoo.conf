[options]
addons_path = /mnt/extra-addons/web,/mnt/extra-addons/server-tools,/mnt/extra-addons/payroll,/mnt/extra-addons/hr,/mnt/extra-addons/hr-holidays,/mnt/extra-addons/hr-attendance,/mnt/extra-addons/hr-expense,/mnt/extra-addons/timesheet,/mnt/extra-addons/reporting-engine,/mnt/extra-addons/account-financial-reporting,/mnt/extra-addons/project,/mnt/extra-addons/fleet,/usr/lib/python3/dist-packages/odoo/addons

; Database
db_host = hr-odoo-db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo
list_db = False

; Security
admin_passwd = $pbkdf2-sha512$25000$changeme

; Proxy and networking
proxy_mode = True
workers = 2
max_cron_threads = 1

; Longpolling for real-time features (mail, website chat)
gevent_port = 8072

; Website and portal features
without_demo = all
server_wide_modules = base,web

; Logging
log_level = info
logfile = /var/log/odoo/odoo.log
