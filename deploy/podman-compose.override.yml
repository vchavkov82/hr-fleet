# HR Product — Development Overrides
# Source mounts for hot-reload, dev commands, and dev-only env vars.
#
# Caddy uses ports 5090/5453 instead of 80/443 to avoid conflicting with
# ../jobs which occupies 80/443 and port 8080 (Go API).
# Access locally via:  http://hr.localhost:5090  /  https://hr.localhost:5453

services:

  caddy:
    ports:
      - "0.0.0.0:5090:80"
      - "0.0.0.0:5453:443"
      - "0.0.0.0:5453:443/udp"

  hr:
    volumes:
      - ../apps/web:/app
      - hr_node_modules:/app/node_modules
    working_dir: /app
    environment:
      - PORT=5010
      - HR_BLOG_URL=http://hr-blog:5013
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: []

  hr-blog:
    volumes:
      - ../apps/blog:/app
      - hr_blog_node_modules:/app/node_modules
    working_dir: /app
    environment:
      - ASTRO_TELEMETRY_DISABLED=1
      - HOST=0.0.0.0
    entrypoint: sh
    command: ["-c", "npm i -g pnpm && pnpm install && pnpm build && npx serve -l 5013 dist"]

  hr-docs:
    volumes:
      - ../:/workspace
      - hr_docs_node_modules:/workspace/node_modules
    working_dir: /workspace/apps/docs
    entrypoint: sh
    command: ["-c", "cd /workspace && npm i -g pnpm && pnpm install && cd apps/docs && pnpm dev"]

  hr-admin:
    volumes:
      - ../apps/admin:/app
      - hr_admin_node_modules:/app/node_modules
    working_dir: /app
    environment:
      - VITE_API_URL=http://hr-api:8080
    entrypoint: sh
    command: ["-c", "npm i -g pnpm && pnpm install && pnpm dev --host 0.0.0.0 --port 5014"]

  # NFR-04: API service healthcheck for load balancer routing and auto-restart
  hr-api:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # NFR-04: Horizontal scaling — increase replicas behind Caddy reverse proxy
    # deploy:
    #   replicas: 3

volumes:
  hr_node_modules:
  hr_blog_node_modules:
  hr_docs_node_modules:
  hr_admin_node_modules:
