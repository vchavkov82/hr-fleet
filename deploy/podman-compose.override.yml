# HR Product — Development Overrides
# Source mounts for hot-reload, dev commands, and dev-only env vars.
# Remote Caddy gateway at ~/src/registry/caddy/ handles TLS + routing.

services:

  hr:
    volumes:
      - ../:/workspace
    working_dir: /workspace/apps/web
    environment:
      - HR_BLOG_URL=http://hr-blog:3013
    entrypoint: sh
    command: ["-c", "cd /workspace && npm i -g pnpm && pnpm install && cd apps/web && pnpm dev"]

  hr-blog:
    volumes:
      - ../:/workspace
    working_dir: /workspace/apps/blog
    environment:
      - ASTRO_TELEMETRY_DISABLED=1
      - HOST=0.0.0.0
    entrypoint: sh
    command: ["-c", "cd /workspace && npm i -g pnpm && pnpm install && cd apps/blog && pnpm build && npx serve -l 3013 dist"]

  hr-docs:
    volumes:
      - ../:/workspace
    working_dir: /workspace/apps/docs
    entrypoint: sh
    command: ["-c", "cd /workspace && npm i -g pnpm && pnpm install && cd apps/docs && pnpm dev"]

  hr-admin:
    volumes:
      - ../:/workspace
    working_dir: /workspace/apps/admin
    environment:
      - VITE_API_URL=http://hr-api:8080
    entrypoint: sh
    command: ["-c", "cd /workspace && npm i -g pnpm && pnpm install && cd apps/admin && pnpm dev --host 0.0.0.0 --port 5014"]

  # NFR-04: API service healthcheck for load balancer routing and auto-restart
  hr-api:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # NFR-04: Horizontal scaling — increase replicas behind Caddy reverse proxy
    # deploy:
    #   replicas: 3

volumes:
  hr_node_modules:
  hr_blog_node_modules:
  hr_docs_node_modules:
  hr_admin_node_modules:
