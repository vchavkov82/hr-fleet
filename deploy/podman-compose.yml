# HR Product — Base Service Definitions
# Usage: podman-compose -f deploy/podman-compose.yml -f deploy/podman-compose.override.yml up -d

services:

  # ── Go backend API ───────────────────────────────────────────────────────
  hr-api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: hr-api
    hostname: hr-api
    ports:
      - "0.0.0.0:5080:8080"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://hr:hr_dev_password@hr-db:5432/hr_platform?sslmode=disable
      ODOO_URL: http://hr-odoo:8069
      REDIS_URL: redis://hr-redis:6379
    depends_on:
      hr-db:
        condition: service_healthy
      odoo:
        condition: service_started
      hr-redis:
        condition: service_healthy
    networks:
      - hr
    restart: unless-stopped
    # API + Asynq worker (Odoo webhooks, payroll, outbound webhook delivery)
    command: ["/server", "-mode=both"]

  # ── Frontend apps (host ports 5020/5021/5023 to avoid conflict with dev-apps on 5010/5011/5013) ──
  hr:
    image: node:20-alpine
    container_name: hr-www
    hostname: hr-www
    ports:
      - "0.0.0.0:5020:3010"
    env_file:
      - ../.env
    networks:
      - hr
    restart: unless-stopped

  hr-blog:
    image: node:20-alpine
    container_name: hr-blog
    hostname: hr-blog
    ports:
      - "0.0.0.0:5023:3013"
    networks:
      - hr
    restart: unless-stopped

  hr-docs:
    image: node:20-alpine
    container_name: hr-docs
    hostname: hr-docs
    ports:
      - "127.0.0.1:5021:3011"
    networks:
      - hr
    restart: unless-stopped

  hr-admin:
    image: node:22-alpine
    container_name: hr-admin
    hostname: hr-admin
    ports:
      - "127.0.0.1:5014:5014"
    env_file:
      - ../.env
    networks:
      - hr
    restart: unless-stopped

  # ── PostgreSQL (API database) ────────────────────────────────────────────
  hr-db:
    image: postgres:16-alpine
    container_name: hr-db
    hostname: hr-db
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - hr_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr -d hr_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr
    restart: unless-stopped

  # ── Odoo ERP ─────────────────────────────────────────────────────────────
  hr-odoo-db:
    image: postgres:17-alpine
    container_name: hr-odoo-db
    hostname: hr-odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr
    restart: unless-stopped

  odoo:
    build:
      context: .
      dockerfile: Dockerfile.odoo
    image: hr-odoo:18.0-oca
    container_name: hr-odoo
    hostname: hr-odoo
    ports:
      - "127.0.0.1:8069:8069"
    environment:
      HOST: hr-odoo-db
      PORT: 5432
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      OPENBLAS_NUM_THREADS: 1
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo-addons/web:/mnt/extra-addons/web:ro
      - ./odoo-addons/server-tools:/mnt/extra-addons/server-tools:ro
      - ./odoo-addons/payroll:/mnt/extra-addons/payroll:ro
      - ./odoo-addons/hr:/mnt/extra-addons/hr:ro
      - ./odoo-addons/hr-holidays:/mnt/extra-addons/hr-holidays:ro
      - ./odoo-addons/hr-attendance:/mnt/extra-addons/hr-attendance:ro
      - ./odoo-addons/hr-expense:/mnt/extra-addons/hr-expense:ro
      - ./odoo-addons/timesheet:/mnt/extra-addons/timesheet:ro
      - ./odoo-addons/reporting-engine:/mnt/extra-addons/reporting-engine:ro
      - ./odoo-addons/account-financial-reporting:/mnt/extra-addons/account-financial-reporting:ro
      - ./odoo-addons/project:/mnt/extra-addons/project:ro
      - ./odoo-addons/fleet:/mnt/extra-addons/fleet:ro
      - ./odoo-addons/contract:/mnt/extra-addons/contract:ro
      - ./odoo-addons/partner-contact:/mnt/extra-addons/partner-contact:ro
      - ./odoo-addons/data-protection:/mnt/extra-addons/data-protection:ro
      - ./odoo-addons/survey:/mnt/extra-addons/survey:ro
      - ./odoo-addons/server-ux:/mnt/extra-addons/server-ux:ro
    depends_on:
      hr-odoo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hr
    restart: unless-stopped

  # ── Redis cache (host 5380 to avoid conflict with local Redis on 5379) ─────
  hr-redis:
    image: redis:7-alpine
    container_name: hr-redis
    hostname: hr-redis
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "127.0.0.1:5380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr
    restart: unless-stopped

networks:
  hr:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  odoo_data:
  odoo_db_data:
  hr_db_data:
  redis_data:
