# HR Product — Base Service Definitions
# Usage: podman-compose -f deploy/podman-compose.yml -f deploy/podman-compose.override.yml up -d

services:

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hr-caddy
    hostname: hr-caddy
    # Ports defined in override files only — dev uses 8080/8443, prod uses 80/443
    env_file:
      - ../.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hr
      - hr-api
      - hr-blog
      - hr-docs
    networks:
      - hr
    restart: unless-stopped

  # ── Go backend API ───────────────────────────────────────────────────────
  hr-api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: hr-api
    hostname: hr-api
    ports:
      - "127.0.0.1:5080:8080"
    env_file:
      - ../.env
    environment:
      ODOO_URL: http://hr-odoo:8069
      REDIS_URL: redis://hr-redis:6379
    depends_on:
      odoo:
        condition: service_started
      hr-redis:
        condition: service_healthy
    networks:
      - hr
    restart: unless-stopped

  # ── Frontend apps (host ports 5020/5021/5023 to avoid conflict with dev-apps on 5010/5011/5013) ──
  hr:
    image: oven/bun:1-alpine
    container_name: hr-www
    hostname: hr-www
    ports:
      - "0.0.0.0:5020:3010"
    env_file:
      - ../.env
    networks:
      - hr
    restart: unless-stopped

  hr-blog:
    image: oven/bun:1-alpine
    container_name: hr-blog
    hostname: hr-blog
    ports:
      - "127.0.0.1:5023:3013"
    networks:
      - hr
    restart: unless-stopped

  hr-docs:
    image: oven/bun:1-alpine
    container_name: hr-docs
    hostname: hr-docs
    ports:
      - "127.0.0.1:5021:3011"
    networks:
      - hr
    restart: unless-stopped

  # ── Odoo ERP ─────────────────────────────────────────────────────────────
  hr-odoo-db:
    image: postgres:17-alpine
    container_name: hr-odoo-db
    hostname: hr-odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo_db_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr
    restart: unless-stopped

  odoo:
    image: odoo:18.0
    container_name: hr-odoo
    hostname: hr-odoo
    ports:
      - "127.0.0.1:8069:8069"
    environment:
      HOST: hr-odoo-db
      PORT: 5432
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo-addons:/mnt/extra-addons
    depends_on:
      hr-odoo-db:
        condition: service_healthy
    networks:
      - hr
    restart: unless-stopped

  # ── Redis cache (host 5380 to avoid conflict with local Redis on 5379) ─────
  hr-redis:
    image: redis:7-alpine
    container_name: hr-redis
    hostname: hr-redis
    ports:
      - "127.0.0.1:5380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr
    restart: unless-stopped

networks:
  hr:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  odoo_data:
  odoo_db_data:
  redis_data:
